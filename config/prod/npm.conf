# NPM Configuration for Production
# Production optimized settings

# Registry and authentication
registry=https://registry.npmjs.org/
always-auth=false

# Cache and performance
cache=/tmp/.npm
prefer-offline=true
prefer-online=false

# Network settings
fetch-retries=3
fetch-retry-factor=10
fetch-retry-mintimeout=10000
fetch-retry-maxtimeout=60000
fetch-timeout=300000

# Security settings
audit-level=moderate
fund=false
update-notifier=false

# Package installation
package-lock=true
save=true
save-exact=false
save-prefix=^
production=true

# Logging and output
loglevel=warn
progress=false
unicode=false

# Performance tuning
maxsockets=15
strict-ssl=true

# Workspace settings
workspaces=false
